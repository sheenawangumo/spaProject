<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width", initial-scale="1.0"/>
        <title>WORDSMITH</title>
        <link rel="stylesheet" href="style.ss"> 
        
         <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
       />
        </head>
        <body>
            <nav class="navbar navbar-expand-lg shadow-sm" >
      <div class="container">
        <header class="text-center  w-100 text-dark">
          <h1 id="page-title" class="m-0">WORDSMITH</h1>
          <p>Look up for words instantly</p>
        </header>
      </div>
    </nav>
      
    <section class="container my-5">
      <div class="mx-auto" style="max-width:400px">
        <div class="input-group shadow rounded">
        <input
          type="text"
          role="search"
          id="search-input"
          placeholder="Search for a word..."
          class="form-control border-0"
          aria-label="Search"
          aria-describedby="search-btn"
        />
        <button class="btn btn-dark px-4" id="search-btn">
          Search
        </button>
      </div>
    </section>
    <div id="status" role="alert" aria-live="polite"></div>
    <div class="card text-center">
      <div class="card-body">
        <section
          id="results"
          aria-label="Dictionary results"
          aria-live="polite"
        ></section>
      </div>
    </div>
    <hr />

    <div class="container">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="card shadow-sm p-3 h-100">
            <section id="saved-section">
              <h3>Saved Words</h3>
              <ul id="saved-list" class="list-unstyled"></ul>
              <hr />
              <button id="clear-btn" class="btn btn-danger btn-sm w-100">
                Clear Saved
              </button>
            </section>
          </div>
        </div>
      
        <div class="col-lg-5 col-md-12 mb-4">
          <div class="p-4 h-100 shadow-sm card">
            <section id="history-section">
              <h3>Recent Searches</h3>
              <ul id="history-list" class="list-unstyled"></ul>
              <hr />
              <button
                id="clear-history-btn"
                class="btn btn-danger btn-sm w-100"
              >
                Erase History
              </button>
            </section>
          </div>
        </div>
      </div>
    </div> 
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
        </body>
</html>
